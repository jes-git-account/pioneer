<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Together - 控制後台</title>
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Together Admin</h2>
      <p>管理控制台</p>
    </div>
    <ul class="sidebar-menu">
      <li class="active" data-target="dashboardSection">📊 營運儀表板</li>
      <li data-target="usersSection">👥 會員管理</li>
      <li data-target="contentSection">📚 作品管理</li>
      <li data-target="marketSection">🛍️ 小舖商品管理</li>
    </ul>
    <div class="sidebar-footer">
      <a href="./index.html" class="back-link">⬅ 返回前台首頁</a>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <h1 id="pageTitle">營運儀表板</h1>
      <div class="topbar-right">
        <span id="adminNameDisplay">管理員</span>
        <button id="adminLogoutBtn" class="btn-logout">登出</button>
      </div>
    </header>
    <div class="content-wrapper">
      <section id="dashboardSection" class="admin-section active">
        <div class="stat-grid">
          <div class="stat-card">
            <h3>總會員數</h3>
            <p id="statUsers" class="stat-value">0</p>
          </div>
          <div class="stat-card">
            <h3>平台作品總數</h3>
            <p id="statComics" class="stat-value">0</p>
          </div>
        </div>
      </section>
      
      <section id="usersSection" class="admin-section hidden">
        <div class="card">
          <table class="admin-table">
            <thead>
              <tr><th>信箱 (帳號)</th><th>身分</th><th>免費點數</th><th>專屬代幣</th></tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>
      </section>

      <section id="contentSection" class="admin-section hidden">
        <div class="card">
          <table class="admin-table">
            <thead>
              <tr><th>作品名稱</th><th>作者</th><th>狀態</th><th style="width: 120px;">操作</th></tr>
            </thead>
            <tbody id="contentTableBody"></tbody>
          </table>
        </div>
      </section>

      <section id="marketSection" class="admin-section hidden">
        <div class="card">
          <table class="admin-table">
            <thead>
              <tr><th>商品名稱</th><th>賣家</th><th style="width: 120px;">操作</th></tr>
            </thead>
            <tbody id="marketTableBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
  <script src="./admin.js"></script>
</body>
</html>
